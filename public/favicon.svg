<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12072b"/>
      <stop offset="50%" stop-color="#240c4a"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </linearGradient>

    <!-- Icon Glow Accent Gradient -->
    <linearGradient id="lyra-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="45%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Ring Gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Drop Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur" />
    </filter>
  </defs>

  <!-- Base Squircle Background -->
  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#bg-grad)" stroke="url(#ring-grad)" stroke-width="6"/>

  <!-- Ambient Backdrop Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#lyra-accent)" opacity="0.25" filter="url(#soft-glow)"/>

  <!-- Outer Glass Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring-grad)" stroke-width="4" stroke-dasharray="12 8" opacity="0.6"/>

  <!-- Glowing Music Note & Lyra Soundwave Symbol -->
  <g filter="url(#glow)">
    <!-- Lyra Harp / Audio Waves Frame -->
    <path d="M 170,160 Q 140,256 170,352" fill="none" stroke="url(#lyra-accent)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 342,160 Q 372,256 342,352" fill="none" stroke="url(#lyra-accent)" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Central Note Head & Stem -->
    <ellipse cx="220" cy="330" rx="36" ry="26" transform="rotate(-20 220 330)" fill="url(#lyra-accent)"/>
    <ellipse cx="300" cy="300" rx="36" ry="26" transform="rotate(-20 300 300)" fill="url(#lyra-accent)"/>
    
    <path d="M 252,320 L 252,160 C 252,160 280,140 332,150 L 332,290" fill="none" stroke="url(#lyra-accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sparkle Stars -->
    <path d="M 370,140 L 376,156 L 392,162 L 376,168 L 370,184 L 364,168 L 348,162 L 364,156 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M 140,330 L 144,342 L 156,346 L 144,350 L 140,362 L 136,350 L 124,346 L 136,342 Z" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>